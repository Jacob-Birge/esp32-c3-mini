; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = elecrow_c3_1_28

[env]
lib_deps = lvgl/lvgl@9.3.0
build_flags = 
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-D LV_CONF_PATH="\"${PROJECT_DIR}/include/lv_conf.h\""
extra_scripts = pre:support/header_gen.py
build_type = release
upload_port = COM3

[emulator_64]
platform = native@1.1.3
extra_scripts = 
	${env.extra_scripts}
	support/sdl2_build_extra.py
build_flags = 
	${env.build_flags}
	!python -c "import os; print(' '.join(['-I {}'.format(i[0].replace('\x5C','/')) for i in os.walk('hal/sdl2')]))"
	-lSDL2
	-D LV_MEM_CUSTOM=1
	-D LV_USE_QRCODE=1
	-D LV_DRV_NO_CONF
	-D LV_USE_SDL=1
	-D SDL_HOR_RES=240
	-D SDL_VER_RES=240
	-D SDL_ZOOM=1
lib_deps = 
	${env.lib_deps}
build_src_filter = 
	+<*>
	+<../hal/sdl2>

[emulator_32]
extends = emulator_64
build_flags = 
	${emulator_64.build_flags}
	-m32
build_src_filter = 
	${emulator_64.build_src_filter}

[env:windows_64]
extends = emulator_64
build_flags = 
	${emulator_64.build_flags}
	-L C:/msys64/mingw64/lib/
	-D SDL_INCLUDE_PATH="\"C:/msys64/mingw64/include/SDL2/SDL.h\""
build_src_filter = ${emulator_64.build_src_filter}

[env:mac_64]
extends = emulator_64
build_flags = 
	${emulator_64.build_flags}
	-D SDL_INCLUDE_PATH="\"SDL2/SDL.h"\"
	!find /opt/homebrew/Cellar/sdl2 -name "include" | sed "s/^/-I /"
	!find /opt/homebrew/Cellar/sdl2 -name "libSDL2.a" | xargs dirname | sed "s/^/-L /"
	-D LV_MEM_SIZE="(128U * 1024U)"
build_src_filter = ${emulator_64.build_src_filter}

[env:linux_64]
extends = emulator_64
build_flags = 
	${emulator_64.build_flags}
	-D SDL_INCLUDE_PATH="\"SDL2/SDL.h"\"
	-I /usr/include/SDL2
	-L /usr/lib/x86_64-linux-gnu
	-lSDL2
	-D LV_MEM_SIZE="(128U * 1024U)"
build_src_filter = ${emulator_64.build_src_filter}

[esp32]
platform = espressif32@6.9.0
framework = arduino
monitor_speed = 115200
extra_scripts = 
	${env.extra_scripts}
	post:support/hardware_build_extra.py
	support/build_firmware.py
lib_deps = 
	${env.lib_deps}
	lovyan03/LovyanGFX@1.1.16
	fbiego/ChronosESP32@1.9.0
	fbiego/Timber@2.0.0
	bblanchon/ArduinoJson@7.1.0
	lennarthennigs/Button2@2.4.1
build_flags = 
	${env.build_flags}
	!python -c "import os; print(' '.join(['-I {}'.format(i[0].replace('\x5C','/')) for i in os.walk('hal/esp32')]))"
	-I lib
	-D LV_TICK_CUSTOM=1
	-D LV_MEM_CUSTOM=0
	-D LV_USE_FS_FATFS=1
build_src_filter = 
	+<*>
	+<../hal/esp32>

[env:elecrow_c3_1_28]
extends = esp32
board = lolin_c3_mini
board_build.partitions = partitions.csv
lib_deps = 
	${esp32.lib_deps}
	makuna/RTC@2.4.3
build_flags = 
	${esp32.build_flags}
	-D ELECROW_C3=1
	-D LV_MEM_SIZE=144U*1024U
	-D LV_USE_QRCODE=1
	-D LV_MEM_ADR=0
	-D BOARD_NAME="\"ELECROW C3 1.28"\"
build_src_filter = ${esp32.build_src_filter}

